version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}

  backend:
    image: ${REGISTRY}/royaltyflux-backend:${TAG:-latest}
    restart: always
    depends_on:
      - postgres
      - redis
    env_file: .env.prod
    ports:
      - '3001:3001'

  frontend:
    image: ${REGISTRY}/royaltyflux-frontend:${TAG:-latest}
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - '443:443'
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
